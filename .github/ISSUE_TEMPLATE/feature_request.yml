name: "Solicitação de Funcionalidade"
description: Crie um novo chamado para solicitar uma nova funcionalidade.
title: "[REQUEST] - <título>"
labels:
  - "question"

body:
  - type: input
    id: start_date
    attributes:
      label: "Data de Início"
      description: Início do desenvolvimento.
      placeholder: "mês/dia/ano"
    validations:
      required: false

  - type: textarea
    id: implementation_pr
    attributes:
      label: "PR de Implementação"
      description: Pull Request utilizado.
      placeholder: "#ID do Pull Request"
    validations:
      required: false

  - type: textarea
    id: reference_issues
    attributes:
      label: "Issues de Referência"
      description: Issues relacionadas ou semelhantes.
      placeholder: "#IDs das Issues"
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: "Resumo"
      description: Forneça uma breve explicação sobre a funcionalidade.
      placeholder: Descreva em poucas linhas sua solicitação de funcionalidade.
    validations:
      required: true

  - type: textarea
    id: basic_example
    attributes:
      label: "Exemplo Básico"
      description: Informe aqui alguns exemplos básicos da funcionalidade.
      placeholder: Algumas palavras específicas sobre sua solicitação de funcionalidade.
    validations:
      required: true

  - type: textarea
    id: drawbacks
    attributes:
      label: "Pontos de Atenção"
      description: Quais são os possíveis impactos ou desvantagens dessa funcionalidade?
      placeholder: Identifique os impactos e pontos de atenção de forma neutra sobre sua solicitação.
    validations:
      required: true

  - type: textarea
    id: unresolved_question
    attributes:
      label: "Questões em Aberto"
      description: Quais dúvidas ainda permanecem sem resposta?
      placeholder: Identifique quaisquer questões ainda não resolvidas.
    validations:
      required: false
