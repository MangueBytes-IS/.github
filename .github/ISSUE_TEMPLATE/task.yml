name: "Tarefa técnica"
description: "Crie uma tarefa de desenvolvimento, infraestrutura, testes, documentação ou outra atividade técnica."
title: "[TASK] "
labels:
  - "task"
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        

  - type: textarea
    id: context
    attributes:
      label: "Contexto"
      description: "Explique por que esta tarefa é necessária e qual problema ou necessidade técnica a originou."
      placeholder: |
        Atualmente...
        Precisamos realizar esta tarefa porque...
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: "Objetivo"
      description: "Descreva o resultado técnico esperado, sem detalhar excessivamente a solução."
      placeholder: |
        Esta tarefa tem como objetivo...
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "Escopo"
      description: "Liste o trabalho que faz parte desta tarefa."
      value: |
        - 
        - 
        - 
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: "Fora do escopo"
      description: "Liste atividades relacionadas que não deverão ser realizadas nesta tarefa."
      placeholder: |
        - Não inclui...
        - Será tratado em outra issue...
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Critérios de aceite"
      description: "Liste condições objetivas e verificáveis para considerar a tarefa concluída."
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: technical_details
    attributes:
      label: "Detalhes técnicos"
      description: "Registre restrições, tecnologias, componentes, contratos, endpoints ou decisões que precisam ser respeitados."
      placeholder: |
        Tecnologias:
        Componentes afetados:
        Restrições:
        Observações:
    validations:
      required: false

  - type: textarea
    id: validation_plan
    attributes:
      label: "Plano de validação"
      description: "Explique como outra pessoa poderá comprovar que a tarefa foi concluída corretamente."
      placeholder: |
        1. Iniciar...
        2. Executar...
        3. Verificar que...
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependências e bloqueios"
      description: "Informe o que precisa estar concluído antes desta tarefa ou quais decisões ainda são necessárias."
      placeholder: |
        Depende de:
        - #123

        Bloqueada por:
        - Nenhum bloqueio conhecido
    validations:
      required: false

  - type: textarea
    id: related_issues
    attributes:
      label: "Issues relacionadas"
      description: "Informe histórias, bugs, tarefas ou decisões arquiteturais relacionadas."
      placeholder: |
        - Relacionada a #123
        - Complementa #456
    validations:
      required: false

  - type: input
    id: requirements
    attributes:
      label: "Requisitos relacionados"
      description: "Informe os requisitos funcionais e não funcionais relacionados, quando aplicável."
      placeholder: "Ex.: RF06, RNF02, RNF17"
    validations:
      required: false

  - type: textarea
    id: expected_evidence
    attributes:
      label: "Evidências esperadas"
      description: "Informe quais evidências devem ser registradas para permitir a validação."
      placeholder: |
        Prints, vídeo, link de homologação, testes realizados ou documentação atualizada...
    validations:
      required: false

  - type: checkboxes
    id: author_checklist
    attributes:
      label: "Checklist de criação"
      description: "Confirme que a tarefa possui informações suficientes para ser refinada."
      options:
        - label: "O objetivo da tarefa está claro."
          required: true
        - label: "Os critérios de aceite são verificáveis."
          required: true
        - label: "Não incluí credenciais, dados pessoais ou informações sensíveis."
          required: true
